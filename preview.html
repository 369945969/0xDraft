<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档预览 - 0xDraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;
        }
        .breadcrumb a { color: var(--accent-blue); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb i { width: 14px; height: 14px; }

        .preview-layout {
            display: grid; grid-template-columns: 280px 1fr; gap: 24px; align-items: start;
        }
        .preview-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: sticky; top: 24px;
        }
        .preview-sidebar-header {
            padding: 16px 20px; border-bottom: 1px solid var(--border-default);
            background: var(--bg-secondary);
            font-weight: 600; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .preview-sidebar-header i { width: 16px; height: 16px; color: var(--accent-blue); }
        .outline-list { padding: 12px; }
        .outline-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: var(--radius-md);
            font-size: 13px; cursor: pointer; transition: all var(--transition-fast);
            color: var(--text-secondary); text-decoration: none;
        }
        .outline-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .outline-item.active { background: rgba(99,102,241,0.1); color: var(--accent-blue); }
        .outline-item .check {
            width: 16px; height: 16px; border-radius: 4px;
            border: 2px solid var(--border-default); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }
        .outline-item.done .check {
            background: var(--accent-green); border-color: var(--accent-green);
        }
        .outline-item .num { font-weight: 600; min-width: 20px; }
        .outline-item .title { flex: 1; }
        .outline-item .status-dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        }

        .preview-main {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .preview-toolbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 20px; border-bottom: 1px solid var(--border-default);
            background: var(--bg-secondary);
        }
        .preview-toolbar-left {
            display: flex; align-items: center; gap: 8px;
        }
        .preview-toolbar-right {
            display: flex; align-items: center; gap: 8px;
        }
        .toolbar-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 12px; border-radius: var(--radius-md);
            background: var(--bg-card); border: 1px solid var(--border-default);
            color: var(--text-secondary); font-size: 12px; font-weight: 500;
            cursor: pointer; transition: all var(--transition-fast);
        }
        .toolbar-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .toolbar-btn i { width: 14px; height: 14px; }

        .markdown-body {
            padding: 32px; min-height: 500px;
            font-size: 15px; line-height: 1.8; color: var(--text-primary);
        }
        .markdown-body h1 { font-size: 28px; font-weight: 700; margin: 0 0 20px; color: var(--text-primary); border-bottom: 2px solid var(--accent-blue); padding-bottom: 12px; }
        .markdown-body h2 { font-size: 22px; font-weight: 600; margin: 32px 0 16px; color: var(--accent-cyan); }
        .markdown-body h3 { font-size: 18px; font-weight: 600; margin: 24px 0 12px; color: var(--text-primary); }
        .markdown-body p { margin: 0 0 16px; }
        .markdown-body ul, .markdown-body ol { margin: 0 0 16px 20px; }
        .markdown-body li { margin-bottom: 6px; }
        .markdown-body code { background: var(--bg-secondary); padding: 2px 8px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        .markdown-body pre { background: var(--bg-secondary); padding: 16px; border-radius: var(--radius-md); overflow-x: auto; margin: 0 0 16px; }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body blockquote { border-left: 4px solid var(--accent-blue); padding-left: 16px; margin: 0 0 16px; color: var(--text-secondary); }
        .markdown-body hr { border: none; border-top: 1px solid var(--border-default); margin: 32px 0; }
        .markdown-body a { color: var(--accent-blue); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 0 0 16px; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--border-default); padding: 10px 14px; text-align: left; }
        .markdown-body th { background: var(--bg-secondary); font-weight: 600; }

        .task-source-link {
            text-align: right; margin-top: -8px; margin-bottom: 16px;
        }
        .task-source-link a {
            font-size: 12px; color: var(--accent-blue); text-decoration: none;
        }

        .empty-preview {
            text-align: center; padding: 100px 20px; color: var(--text-secondary);
        }
        .empty-preview i { width: 56px; height: 56px; margin-bottom: 20px; opacity: 0.3; }

        .btn-primary {
            background: var(--gradient-primary); color: white !important;
        }

        @media (max-width: 992px) {
            .preview-layout { grid-template-columns: 1fr; }
            .preview-sidebar { position: static; }
        }
            /* Project Selector in Header */
        .project-selector { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-md); cursor: pointer; margin-left: 16px; transition: all var(--transition-fast); }
        .project-selector:hover { border-color: var(--accent-blue); }
        .project-selector-info { display: flex; flex-direction: column; }
        .project-selector-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .project-selector-name { font-size: 13px; font-weight: 600; color: var(--text-primary); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-selector i { width: 14px; height: 14px; color: var(--text-secondary); }

    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo" style="text-decoration:none;color:inherit;">
                    <div class="logo-icon"><i data-lucide="bot" class="logo-botsvg"></i></div>
                    <div class="logo-text">
                        <span class="logo-title">0xDraft</span>
                        <span class="logo-subtitle">Multi-Agent Team</span>
                    </div>
                </a>

                <div class="project-selector" onclick="window.location.href='index.html'">
                    <div class="project-selector-info">
                        <span class="project-selector-label">当前项目</span>
                        <span class="project-selector-name" id="currentProjectName">载入中...</span>
                    </div>
                    <i data-lucide="chevron-down"></i>
                </div>

                <nav class="page-nav">
                    <a href="index.html" class="page-nav-item"><i data-lucide="layout-dashboard"></i> 首页</a>
                    <a href="analysis.html" class="page-nav-item"><i data-lucide="lightbulb"></i> 分析</a>
                    <a href="kanban.html" class="page-nav-item"><i data-lucide="layout-grid"></i> 看板</a>
                    <a href="agents.html" class="page-nav-item"><i data-lucide="users"></i> Agent</a>
                    <a href="preview.html" class="page-nav-item active"><i data-lucide="file-text"></i> 预览</a>
                </nav>
            </div>
            <div class="header-right">
                <button class="icon-btn" title="通知"><i data-lucide="bell"></i><span class="badge">3</span></button>
                <div class="user-avatar"><span>U</span></div>
            </div>
        </header>

        <main class="main-content">
            <div class="page-container">
                <nav class="breadcrumb">
                    <a href="index.html"><i data-lucide="home"></i> 首页</a>
                    <i data-lucide="chevron-right"></i>
                    <span id="breadcrumbProject">项目名</span>
                    <i data-lucide="chevron-right"></i>
                    <span>文档预览</span>
                </nav>

                <div class="preview-layout">
                    <aside class="preview-sidebar">
                        <div class="preview-sidebar-header">
                            <i data-lucide="list"></i> 章节大纲
                        </div>
                        <div class="outline-list" id="outlineList">
                            <!-- Outline items generated by JS -->
                        </div>
                    </aside>

                    <div class="preview-main">
                        <div class="preview-toolbar">
                            <div class="preview-toolbar-left">
                                <span style="font-size:13px;color:var(--text-secondary);">实时预览</span>
                            </div>
                            <div class="preview-toolbar-right">
                                <button class="toolbar-btn" id="copyBtn"><i data-lucide="copy"></i> 复制</button>
                                <button class="toolbar-btn" id="exportMdBtn"><i data-lucide="download"></i> Markdown</button>
                                <button class="toolbar-btn" id="fullscreenBtn"><i data-lucide="maximize"></i> 全屏</button>
                            </div>
                        </div>
                        <div class="markdown-body" id="markdownBody">
                            <div class="empty-preview">
                                <i data-lucide="file-text"></i>
                                <h3 style="margin-bottom:8px;">暂无文档内容</h3>
                                <p>在看板中完成任务后，文档内容将自动生成</p>
                                <a href="kanban.html" class="btn btn-primary" style="margin-top:20px;"><i data-lucide="layout-grid"></i> 去看板</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-left">
                <span class="status-indicator online"></span>
                <span>系统就绪</span>
            </div>
            <div class="footer-center">
                <span id="lastUpdate">最后更新: --</span>
                <span id="wordCount" style="margin-left:12px;opacity:0.7;">0 字</span>
            </div>
            <div class="footer-right">
                <a href="settings.html" class="footer-btn" title="系统设置">
                    <i data-lucide="settings"></i>
                </a>
                <button class="footer-btn" id="clearDataBtn" title="清除所有数据">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </footer>
    </div>

    <script src="utils.js"></script>
    <script src="store.js"></script>
    <script>
        const tasks = Store.getTasks();

        function renderOutline() {
            const list = document.getElementById('outlineList');
            const sorted = tasks.sort((a,b) => a.chapterNumber - b.chapterNumber);
            
            if (!sorted.length) {
                // Show example chapters
                const examples = Utils.chapterTemplates;
                list.innerHTML = examples.map(t => `
                    <div class="outline-item" style="opacity: 0.6; cursor: default;">
                        <div class="check"></div>
                        <span class="num">${t.number}</span>
                        <span class="title">${t.title} (示例)</span>
                        <span class="status-dot" style="background:var(--text-muted);"></span>
                    </div>
                `).join('');
                return;
            }
            list.innerHTML = sorted.map(t => `
                <a href="task-detail.html?id=${t.id}" class="outline-item ${t.status === 'done' || t.status === 'published' ? 'done' : ''}">
                    <div class="check">${t.status === 'done' || t.status === 'published' ? '<i data-lucide="check" style="width:10px;height:10px;color:white;"></i>' : ''}</div>
                    <span class="num">${t.chapterNumber}</span>
                    <span class="title">${t.title}</span>
                    <span class="status-dot" style="background:${t.status==='done'||t.status==='published'?'var(--accent-green)':t.status==='in_progress'?'var(--accent-amber)':'var(--text-muted)'};"></span>
                </a>
            `).join('');
        }

        function renderPreview() {
            const body = document.getElementById('markdownBody');
            const sorted = tasks.sort((a,b) => a.chapterNumber - b.chapterNumber);
            if (!sorted.length) return;

            let fullDoc = '';
            sorted.forEach(t => {
                if (t.content) {
                    fullDoc += t.content + '\n\n';
                    fullDoc += `<div class="task-source-link"><a href="task-detail.html?id=${t.id}">查看任务详情 →</a></div>\n\n`;
                    fullDoc += '---\n\n';
                }
            });

            if (!fullDoc.trim()) {
                body.innerHTML = `
                    <div class="empty-preview">
                        <i data-lucide="file-text"></i>
                        <h3 style="margin-bottom:8px;">任务尚未完成</h3>
                        <p>Agent 正在创作中，完成后内容将自动显示</p>
                        <a href="kanban.html" class="btn btn-primary" style="margin-top:20px;"><i data-lucide="layout-grid"></i> 去看板</a>
                    </div>`;
                return;
            }

            body.innerHTML = marked.parse(fullDoc);
            const text = body.innerText || '';
            document.getElementById('wordCount').textContent = text.length + ' 字';
        }

        function updateLastUpdate() {
            const el = document.getElementById('lastUpdate');
            if (el) el.textContent = `最后更新: ${new Date().toLocaleTimeString('zh-CN')}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderOutline();
            renderPreview();
            updateLastUpdate();
            lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
            
            Store.subscribe('tasks', () => {
                renderOutline();
                renderPreview();
                updateLastUpdate();
                lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
            });
        });

        // Toolbar buttons
        document.getElementById('copyBtn').addEventListener('click', () => {
            const text = document.getElementById('markdownBody').innerText;
            navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
        });

        document.getElementById('exportMdBtn').addEventListener('click', () => {
            const sorted = tasks.sort((a,b) => a.chapterNumber - b.chapterNumber);
            let md = '';
            sorted.forEach(t => { if (t.content) md += t.content + '\n\n---\n\n'; });
            const blob = new Blob([md], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = (Store.get('project.name') || 'document') + '.md';
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('fullscreenBtn').addEventListener('click', () => {
            const sidebar = document.querySelector('.preview-sidebar');
            const layout = document.querySelector('.preview-layout');
            if (sidebar.style.display === 'none') {
                sidebar.style.display = '';
                layout.style.gridTemplateColumns = '280px 1fr';
            } else {
                sidebar.style.display = 'none';
                layout.style.gridTemplateColumns = '1fr';
            }
        });

        document.getElementById('clearDataBtn')?.addEventListener('click', () => {
            if (confirm('确定要清除所有数据吗？此操作不可撤销。')) {
                Store.clearAll();
                window.location.reload();
            }
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function syncProject() {
                const project = Store.getCurrentProject();
                if (project) {
                    const nameEl = document.getElementById('currentProjectName');
                    if (nameEl) nameEl.textContent = project.name;
                    const bcEl = document.getElementById('breadcrumbProject');
                    if (bcEl) bcEl.textContent = project.name;
                }
            }
            syncProject();
            Store.subscribe('currentProjectId', () => {
                syncProject();
            });
        });
    </script>

</body>
</html>
