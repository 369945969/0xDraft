<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>需求分析 - 0xDraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary); margin-bottom: 20px;
        }
        .breadcrumb a { color: var(--accent-blue); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb i { width: 14px; height: 14px; }

        .analysis-layout {
            display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: start;
        }
        .analysis-nav {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: sticky; top: 24px;
        }
        .analysis-nav-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 18px; width: 100%; background: none; border: none;
            color: var(--text-secondary); font-size: 14px; font-weight: 500;
            cursor: pointer; text-align: left; transition: all var(--transition-fast);
            border-left: 3px solid transparent;
        }
        .analysis-nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .analysis-nav-item.active {
            background: rgba(99,102,241,0.1); color: var(--accent-blue);
            border-left-color: var(--accent-blue);
        }
        .analysis-nav-item i { width: 18px; height: 18px; }

        .analysis-panels { display: flex; flex-direction: column; gap: 24px; }
        .analysis-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .analysis-panel-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border-default);
            background: var(--bg-secondary);
            display: flex; align-items: center; justify-content: space-between;
        }
        .analysis-panel-header h2 {
            font-family: 'Space Grotesk', sans-serif; font-size: 18px;
            display: flex; align-items: center; gap: 10px;
        }
        .analysis-panel-header h2 i { width: 22px; height: 22px; color: var(--accent-blue); }
        .analysis-panel-body { padding: 24px; }

        .req-textarea {
            width: 100%; min-height: 220px; background: var(--bg-primary);
            border: 1px solid var(--border-default); border-radius: var(--radius-md);
            padding: 16px; color: var(--text-primary); font-size: 14px; line-height: 1.7;
            resize: vertical; transition: border-color var(--transition-fast);
            font-family: 'Inter', sans-serif;
        }
        .req-textarea:focus {
            outline: none; border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .req-textarea::placeholder { color: var(--text-muted); }

        .hint-box {
            background: var(--bg-secondary); border-radius: var(--radius-md);
            padding: 12px 16px; font-size: 13px; color: var(--text-secondary);
            margin-top: 12px; display: flex; align-items: flex-start; gap: 10px;
        }
        .hint-box i { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; }

        .analysis-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 28px; border-radius: var(--radius-md);
            background: var(--gradient-primary); color: white;
            font-size: 14px; font-weight: 600; border: none; cursor: pointer;
            transition: all var(--transition-fast); margin-top: 16px;
        }
        .analysis-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .analysis-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .loading-state {
            display: none; align-items: center; gap: 16px;
            padding: 40px; justify-content: center;
        }
        .loading-state.active { display: flex; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--border-default);
            border-top-color: var(--accent-blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .result-section { margin-bottom: 24px; }
        .result-section:last-child { margin-bottom: 0; }
        .result-section h3 {
            font-size: 14px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
        }
        .result-section h3 i { width: 16px; height: 16px; color: var(--accent-cyan); }

        .module-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;
        }
        .module-card {
            background: var(--bg-secondary); border: 1px solid var(--border-default);
            border-radius: var(--radius-md); padding: 14px;
            transition: all var(--transition-fast);
        }
        .module-card:hover { border-color: var(--accent-blue); }
        .module-card .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .module-card .desc { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }

        .chapter-list {
            display: flex; flex-direction: column; gap: 10px;
        }
        .chapter-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; background: var(--bg-secondary);
            border-radius: var(--radius-md); border: 1px solid var(--border-default);
            transition: all var(--transition-fast);
        }
        .chapter-item:hover { border-color: var(--accent-purple); }
        .chapter-item .num {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--accent-purple); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700; flex-shrink: 0;
        }
        .chapter-item .info { flex: 1; }
        .chapter-item .title { font-weight: 500; font-size: 14px; }
        .chapter-item .desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .chapter-item .badge {
            font-size: 11px; padding: 3px 10px; border-radius: 10px;
            background: var(--bg-card); color: var(--text-secondary);
        }

        .tech-tags {
            display: flex; flex-wrap: wrap; gap: 8px;
        }
        .tech-tag {
            padding: 6px 14px; border-radius: 20px;
            background: var(--bg-secondary); border: 1px solid var(--border-default);
            font-size: 13px; color: var(--text-primary);
            transition: all var(--transition-fast);
        }
        .tech-tag:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

        .empty-result {
            text-align: center; padding: 60px 20px; color: var(--text-secondary);
        }
        .empty-result i { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }

        .success-banner {
            display: none; align-items: center; gap: 12px;
            padding: 14px 18px; background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3); border-radius: var(--radius-md);
            margin-bottom: 20px; color: var(--accent-green);
        }
        .success-banner.active { display: flex; }
        .success-banner i { width: 20px; height: 20px; }

        .history-list {
            display: flex; flex-direction: column; gap: 10px;
        }
        .history-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; background: var(--bg-secondary);
            border-radius: var(--radius-md); cursor: pointer;
            transition: all var(--transition-fast);
        }
        .history-item:hover { background: var(--bg-card-hover); }
        .history-item .time { font-size: 12px; color: var(--text-muted); flex-shrink: 0; }
        .history-item .summary { flex: 1; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .history-item .count { font-size: 12px; color: var(--accent-blue); background: rgba(99,102,241,0.1); padding: 2px 8px; border-radius: 10px; }

        @media (max-width: 992px) {
            .analysis-layout { grid-template-columns: 1fr; }
            .analysis-nav { position: static; }
        }
            /* Project Selector in Header */
        .project-selector { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-md); cursor: pointer; margin-left: 16px; transition: all var(--transition-fast); }
        .project-selector:hover { border-color: var(--accent-blue); }
        .project-selector-info { display: flex; flex-direction: column; }
        .project-selector-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .project-selector-name { font-size: 13px; font-weight: 600; color: var(--text-primary); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-selector i { width: 14px; height: 14px; color: var(--text-secondary); }

    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo" style="text-decoration:none;color:inherit;">
                    <div class="logo-icon"><i data-lucide="bot" class="logo-botsvg"></i></div>
                    <div class="logo-text">
                        <span class="logo-title">0xDraft</span>
                        <span class="logo-subtitle">Multi-Agent Team</span>
                    </div>
                </a>

                <div class="project-selector" onclick="window.location.href='index.html'">
                    <div class="project-selector-info">
                        <span class="project-selector-label">当前项目</span>
                        <span class="project-selector-name" id="currentProjectName">载入中...</span>
                    </div>
                    <i data-lucide="chevron-down"></i>
                </div>

                <nav class="page-nav">
                    <a href="index.html" class="page-nav-item"><i data-lucide="layout-dashboard"></i> 首页</a>
                    <a href="analysis.html" class="page-nav-item active"><i data-lucide="lightbulb"></i> 分析</a>
                    <a href="kanban.html" class="page-nav-item"><i data-lucide="layout-grid"></i> 看板</a>
                    <a href="agents.html" class="page-nav-item"><i data-lucide="users"></i> Agent</a>
                    <a href="preview.html" class="page-nav-item"><i data-lucide="file-text"></i> 预览</a>
                </nav>
            </div>
            <div class="header-right">
                <button class="icon-btn" title="通知"><i data-lucide="bell"></i><span class="badge">3</span></button>
                <div class="user-avatar"><span>U</span></div>
            </div>
        </header>

        <main class="main-content">
            <div class="page-container">
                <nav class="breadcrumb">
                    <a href="index.html"><i data-lucide="home"></i> 首页</a>
                    <i data-lucide="chevron-right"></i>
                    <span id="breadcrumbProject">项目名</span>
                    <i data-lucide="chevron-right"></i>
                    <span>需求分析</span>
                </nav>

                <div class="analysis-layout">
                    <aside class="analysis-nav" id="analysisNav">
                        <button class="analysis-nav-item active" data-panel="input">
                            <i data-lucide="edit-3"></i> 需求输入
                        </button>
                        <button class="analysis-nav-item" data-panel="result">
                            <i data-lucide="bar-chart-2"></i> 分析结果
                        </button>
                        <button class="analysis-nav-item" data-panel="history">
                            <i data-lucide="history"></i> 历史记录
                        </button>
                    </aside>

                    <div class="analysis-panels" id="analysisPanels">
                        <!-- Input Panel -->
                        <div class="analysis-panel" id="inputPanel">
                            <div class="analysis-panel-header">
                                <h2><i data-lucide="lightbulb"></i> 需求输入</h2>
                            </div>
                            <div class="analysis-panel-body">
                                <p style="font-size:14px;color:var(--text-secondary);margin-bottom:16px;">请输入您的项目需求描述，AI Agent团队将为您分析并生成文档结构建议。</p>
                                <textarea class="req-textarea" id="reqInput" placeholder="例如：我们需要设计一个多Agent协作的看板系统，用于管理软件概念设计文档的创作流程。系统应支持需求分析、任务分解、Agent分配、内容创作、审视验证和文档整合..."></textarea>
                                <div class="hint-box">
                                    <i data-lucide="info"></i>
                                    <span>建议包含：项目背景、核心功能、目标用户、技术要求、约束条件等信息，越详细分析结果越精准。</span>
                                </div>
                                <div style="display:flex;gap:12px;margin-top:16px;">
                                    <button class="analysis-btn" id="analyzeBtn"><i data-lucide="zap"></i> 开始分析</button>
                                    <button class="btn btn-secondary" id="clearBtn"><i data-lucide="trash-2"></i> 清空</button>
                                </div>
                            </div>
                        </div>

                        <!-- Result Panel -->
                        <div class="analysis-panel" id="resultPanel" style="display:none;">
                            <div class="analysis-panel-header">
                                <h2><i data-lucide="bar-chart-2"></i> 分析结果</h2>
                                <div style="display:flex;gap:8px;">
                                    <button class="btn btn-secondary btn-sm" id="regenerateBtn"><i data-lucide="refresh-cw"></i> 重新分析</button>
                                    <button class="btn btn-primary btn-sm" id="createTasksBtn"><i data-lucide="plus"></i> 创建任务</button>
                                </div>
                            </div>
                            <div class="analysis-panel-body">
                                <div class="success-banner" id="successBanner">
                                    <i data-lucide="check-circle"></i>
                                    <span>分析完成！共识别出 <strong id="moduleCount">0</strong> 个关键模块，建议 <strong id="chapterCount">0</strong> 个章节。</span>
                                </div>
                                <div class="loading-state" id="loadingState">
                                    <div class="spinner"></div>
                                    <div>
                                        <div style="font-weight:600;margin-bottom:4px;">正在分析需求...</div>
                                        <div style="font-size:13px;color:var(--text-secondary);">AI Agent团队正在提取关键信息</div>
                                    </div>
                                </div>
                                <div id="resultContent">
                                    <div class="empty-result">
                                        <i data-lucide="file-search"></i>
                                        <h3 style="margin-bottom:8px;">暂无分析结果</h3>
                                        <p>在左侧输入需求并点击"开始分析"</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- History Panel -->
                        <div class="analysis-panel" id="historyPanel" style="display:none;">
                            <div class="analysis-panel-header">
                                <h2><i data-lucide="history"></i> 历史记录</h2>
                            </div>
                            <div class="analysis-panel-body">
                                <div class="history-list" id="historyList">
                                    <div class="empty-result" style="padding:40px 20px;">
                                        <i data-lucide="inbox"></i>
                                        <h3 style="margin-bottom:8px;">暂无历史记录</h3>
                                        <p>分析结果将自动保存到这里</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-left">
                <span class="status-indicator online"></span>
                <span>系统就绪</span>
            </div>
            <div class="footer-center">
                <span id="lastUpdate">最后更新: --</span>
            </div>
            <div class="footer-right">
                <a href="settings.html" class="footer-btn" title="系统设置">
                    <i data-lucide="settings"></i>
                </a>
                <button class="footer-btn" id="clearDataBtn" title="清除所有数据">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </footer>
    </div>

    <script>
        const STORAGE_KEY = 'agent_board_state';
        const ANALYSIS_HISTORY_KEY = 'agent_board_analysis_history';

        function loadState() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
        }
        function saveState(state) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }
        function loadHistory() {
            try { return JSON.parse(localStorage.getItem(ANALYSIS_HISTORY_KEY)) || []; } catch(e) { return []; }
        }
        function saveHistory(history) {
            localStorage.setItem(ANALYSIS_HISTORY_KEY, JSON.stringify(history));
        }

        const state = loadState();
        const tasks = state.tasks || [];
        const agents = state.agents || [];

        // Sidebar navigation
        document.querySelectorAll('.analysis-nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.analysis-nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                const panel = item.dataset.panel;
                document.querySelectorAll('#analysisPanels > .analysis-panel').forEach(p => p.style.display = 'none');
                document.getElementById(panel + 'Panel').style.display = '';
                if (panel === 'history') renderHistory();
            });
        });

        // Clear button
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('reqInput').value = '';
        });

        // Analyze button
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            const input = document.getElementById('reqInput').value.trim();
            if (!input) {
                alert('请输入需求描述');
                return;
            }
            runAnalysis(input);
        });

        // Regenerate button
        document.getElementById('regenerateBtn').addEventListener('click', () => {
            const input = document.getElementById('reqInput').value.trim();
            if (input) runAnalysis(input);
        });

        function runAnalysis(input) {
            // Switch to result panel
            document.querySelectorAll('.analysis-nav-item').forEach(i => i.classList.remove('active'));
            document.querySelector('[data-panel="result"]').classList.add('active');
            document.querySelectorAll('#analysisPanels > .analysis-panel').forEach(p => p.style.display = 'none');
            document.getElementById('resultPanel').style.display = '';

            const loading = document.getElementById('loadingState');
            const content = document.getElementById('resultContent');
            const banner = document.getElementById('successBanner');

            loading.classList.add('active');
            content.innerHTML = '';
            banner.classList.remove('active');

            setTimeout(() => {
                loading.classList.remove('active');
                const result = generateMockAnalysis(input);
                renderResult(result);
                saveAnalysisToHistory(input, result);
            }, 1800);
        }

        function generateMockAnalysis(input) {
            const modules = [
                { name: '用户认证模块', desc: '负责用户登录、注册、权限管理' },
                { name: '任务管理模块', desc: '负责任务的创建、分配、状态追踪' },
                { name: 'Agent调度模块', desc: '负责Agent的负载均衡和任务分发' },
                { name: '文档生成模块', desc: '负责Markdown渲染和文档导出' },
                { name: '协作看板模块', desc: '负责拖拽式看板和实时同步' }
            ];
            const chapters = [
                { num: 1, title: '项目概述', desc: '项目背景、目标和范围定义', agent: '产品经理' },
                { num: 2, title: '系统架构设计', desc: '整体架构、技术选型和模块划分', agent: '架构师' },
                { num: 3, title: '功能需求说明', desc: '核心功能、用户场景和交互流程', agent: '产品经理' },
                { num: 4, title: 'UI/UX设计', desc: '界面设计、交互设计和视觉规范', agent: '设计师' },
                { num: 5, title: '技术实现细节', desc: '数据库设计、API接口和核心算法', agent: '开发者' },
                { num: 6, title: '测试与部署', desc: '测试策略、部署方案和运维文档', agent: '评审' }
            ];
            const techStack = ['React', 'Node.js', 'PostgreSQL', 'Docker', 'WebSocket', 'Markdown', 'LLM API', 'Redis'];
            return { modules, chapters, techStack };
        }

        function renderResult(result) {
            const content = document.getElementById('resultContent');
            document.getElementById('moduleCount').textContent = result.modules.length;
            document.getElementById('chapterCount').textContent = result.chapters.length;
            document.getElementById('successBanner').classList.add('active');

            content.innerHTML = `
                <div class="result-section">
                    <h3><i data-lucide="box"></i> 关键模块 (${result.modules.length})</h3>
                    <div class="module-grid">
                        ${result.modules.map(m => `
                            <div class="module-card">
                                <div class="name">${m.name}</div>
                                <div class="desc">${m.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="result-section">
                    <h3><i data-lucide="list"></i> 建议章节结构</h3>
                    <div class="chapter-list">
                        ${result.chapters.map(c => `
                            <div class="chapter-item">
                                <div class="num">${c.num}</div>
                                <div class="info">
                                    <div class="title">${c.title}</div>
                                    <div class="desc">${c.desc}</div>
                                </div>
                                <span class="badge">${c.agent}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                <div class="result-section">
                    <h3><i data-lucide="cpu"></i> 建议技术栈</h3>
                    <div class="tech-tags">
                        ${result.techStack.map(t => `<span class="tech-tag">${t}</span>`).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
        }

        function saveAnalysisToHistory(input, result) {
            const history = loadHistory();
            history.unshift({
                id: Date.now(),
                summary: input.substring(0, 60) + (input.length > 60 ? '...' : ''),
                modules: result.modules.length,
                chapters: result.chapters.length,
                timestamp: Date.now()
            });
            if (history.length > 20) history.pop();
            saveHistory(history);
        }

        function renderHistory() {
            const history = loadHistory();
            const container = document.getElementById('historyList');
            if (!history.length) {
                container.innerHTML = `
                    <div class="empty-result" style="padding:40px 20px;">
                        <i data-lucide="inbox"></i>
                        <h3 style="margin-bottom:8px;">暂无历史记录</h3>
                        <p>分析结果将自动保存到这里</p>
                    </div>`;
            } else {
                container.innerHTML = history.map(h => `
                    <div class="history-item" data-id="${h.id}">
                        <span class="time">${new Date(h.timestamp).toLocaleString('zh-CN')}</span>
                        <span class="summary">${h.summary}</span>
                        <span class="count">${h.modules}模块 · ${h.chapters}章</span>
                    </div>
                `).join('');
            }
            lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
        }

        // Create tasks button
        document.getElementById('createTasksBtn').addEventListener('click', () => {
            const result = generateMockAnalysis(document.getElementById('reqInput').value);
            const newTasks = result.chapters.map((c, i) => ({
                id: 'task_' + Date.now() + '_' + i,
                projectId: state.project?.id,
                chapterNumber: c.num,
                title: c.title,
                description: c.desc,
                content: '',
                status: 'backlog',
                priority: i < 2 ? 'P0' : 'P1',
                assignedAgentId: null,
                progress: 0,
                estimatedHours: 8,
                actualHours: 0,
                createdAt: Date.now(),
                updatedAt: Date.now()
            }));
            state.tasks = [...tasks, ...newTasks];
            saveState(state);
            alert(`已创建 ${newTasks.length} 个任务到看板！`);
            window.location.href = 'kanban.html';
        });

        lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
    </script>
    <script src="utils.js"></script>
    <script src="store.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function syncProject() {
                const project = Store.getCurrentProject();
                if (project) {
                    const nameEl = document.getElementById('currentProjectName');
                    if (nameEl) nameEl.textContent = project.name;
                    const bcEl = document.getElementById('breadcrumbProject');
                    if (bcEl) bcEl.textContent = project.name;
                }
            }
            syncProject();
            Store.subscribe('currentProjectId', () => {
                syncProject();
            });
        });
    </script>

</body>
