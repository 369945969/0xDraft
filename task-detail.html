<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务详情 - 0xDraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .breadcrumb {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-secondary);
            margin-bottom: 20px;
        }
        .breadcrumb a { color: var(--accent-blue); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb i { width: 14px; height: 14px; }

        .task-detail-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            margin-bottom: 24px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border-default);
        }
        .task-detail-title h1 {
            font-family: 'Space Grotesk', sans-serif; font-size: 28px;
            display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
        }
        .task-detail-meta {
            display: flex; align-items: center; gap: 16px;
            font-size: 14px; color: var(--text-secondary);
        }
        .task-detail-meta .meta-item {
            display: flex; align-items: center; gap: 6px;
        }
        .task-detail-meta .meta-item i { width: 16px; height: 16px; }
        .task-detail-meta .meta-item a {
            color: var(--accent-blue); text-decoration: none;
        }
        .task-detail-meta .meta-item a:hover { text-decoration: underline; }

        .task-detail-actions { display: flex; gap: 12px; }

        .detail-grid {
            display: grid; grid-template-columns: 280px 1fr;
            gap: 24px; align-items: start;
        }
        .detail-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
        }
        .sidebar-section h3 {
            font-size: 13px; text-transform: uppercase;
            color: var(--text-muted); letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .sidebar-agent {
            display: flex; align-items: center; gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            text-decoration: none; color: inherit;
            transition: all var(--transition-fast);
        }
        .sidebar-agent:hover {
            border: 1px solid var(--accent-blue);
            transform: translateY(-1px);
        }
        .sidebar-agent .agent-avatar-sm {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700; color: white; flex-shrink: 0;
        }
        .sidebar-agent-info { flex: 1; }
        .sidebar-agent-info .name { font-weight: 600; font-size: 14px; }
        .sidebar-agent-info .type { font-size: 12px; color: var(--text-secondary); }

        .status-timeline {
            display: flex; flex-direction: column; gap: 0;
            position: relative;
        }
        .status-timeline::before {
            content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px;
            width: 2px; background: var(--border-default);
        }
        .timeline-item {
            display: flex; align-items: center; gap: 12px;
            padding: 8px 0; position: relative;
        }
        .timeline-dot {
            width: 24px; height: 24px; border-radius: 50%;
            background: var(--bg-secondary);
            border: 2px solid var(--border-default);
            display: flex; align-items: center; justify-content: center;
            z-index: 1; flex-shrink: 0;
        }
        .timeline-dot.active {
            border-color: var(--accent-green);
            background: rgba(16,185,129,0.2);
        }
        .timeline-dot.active i { width: 12px; height: 12px; color: var(--accent-green); }
        .timeline-label { font-size: 13px; color: var(--text-secondary); }
        .timeline-label.active { color: var(--text-primary); font-weight: 500; }

        .detail-main {
            background: var(--bg-card);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .detail-tabs {
            display: flex; border-bottom: 1px solid var(--border-default);
            background: var(--bg-secondary);
        }
        .detail-tab {
            padding: 14px 20px; background: none; border: none;
            color: var(--text-secondary); font-size: 14px; font-weight: 500;
            cursor: pointer; position: relative; transition: all var(--transition-fast);
        }
        .detail-tab:hover { color: var(--text-primary); background: rgba(99,102,241,0.05); }
        .detail-tab.active { color: var(--accent-blue); }
        .detail-tab.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0;
            height: 2px; background: var(--gradient-primary);
        }

        .detail-panel { display: none; padding: 24px; }
        .detail-panel.active { display: block; }

        .content-editor {
            width: 100%; min-height: 400px;
            background: var(--bg-input);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            padding: 16px; color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace; font-size: 14px;
            line-height: 1.7; resize: vertical;
        }
        .content-editor:focus {
            outline: none; border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
        }

        .logs-list {
            display: flex; flex-direction: column; gap: 12px;
        }
        .log-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            padding: 14px;
        }
        .log-card-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 8px;
        }
        .log-card-agent {
            display: flex; align-items: center; gap: 8px;
            font-weight: 500; font-size: 14px;
        }
        .log-card-time { font-size: 12px; color: var(--text-muted); margin-left: auto; }
        .log-card-body { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

        .related-tasks {
            display: flex; flex-direction: column; gap: 10px;
        }
        .related-task-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px; background: var(--bg-secondary);
            border-radius: var(--radius-md); text-decoration: none;
            color: inherit; transition: all var(--transition-fast);
        }
        .related-task-item:hover {
            border: 1px solid var(--accent-blue);
            transform: translateX(4px);
        }
        .related-task-item .chapter-num {
            width: 28px; height: 28px; border-radius: 50%;
            background: var(--accent-purple); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; flex-shrink: 0;
        }
        .related-task-item .task-title { flex: 1; font-size: 14px; }
        .related-task-item .task-status {
            font-size: 11px; padding: 2px 8px; border-radius: 10px;
            background: var(--bg-card);
        }

        .empty-detail {
            text-align: center; padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-detail i { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }

        @media (max-width: 992px) {
            .detail-grid { grid-template-columns: 1fr; }
            .task-detail-header { flex-direction: column; gap: 16px; }
        }
            /* Project Selector in Header */
        .project-selector { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border-default); border-radius: var(--radius-md); cursor: pointer; margin-left: 16px; transition: all var(--transition-fast); }
        .project-selector:hover { border-color: var(--accent-blue); }
        .project-selector-info { display: flex; flex-direction: column; }
        .project-selector-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .project-selector-name { font-size: 13px; font-weight: 600; color: var(--text-primary); max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .project-selector i { width: 14px; height: 14px; color: var(--text-secondary); }

    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <a href="index.html" class="logo" style="text-decoration:none;color:inherit;">
                    <div class="logo-icon"><i data-lucide="bot" class="logo-botsvg"></i></div>
                    <div class="logo-text">
                        <span class="logo-title">0xDraft</span>
                        <span class="logo-subtitle">Multi-Agent Team</span>
                    </div>
                </a>

                <div class="project-selector" onclick="window.location.href='index.html'">
                    <div class="project-selector-info">
                        <span class="project-selector-label">当前项目</span>
                        <span class="project-selector-name" id="currentProjectName">载入中...</span>
                    </div>
                    <i data-lucide="chevron-down"></i>
                </div>

                <nav class="page-nav">
                    <a href="index.html" class="page-nav-item"><i data-lucide="layout-dashboard"></i> 首页</a>
                    <a href="analysis.html" class="page-nav-item"><i data-lucide="lightbulb"></i> 分析</a>
                    <a href="kanban.html" class="page-nav-item active"><i data-lucide="layout-grid"></i> 看板</a>
                    <a href="agents.html" class="page-nav-item"><i data-lucide="users"></i> Agent</a>
                    <a href="preview.html" class="page-nav-item"><i data-lucide="file-text"></i> 预览</a>
                </nav>
            </div>
            <div class="header-right">
                <button class="icon-btn" title="通知"><i data-lucide="bell"></i><span class="badge">3</span></button>
                <div class="user-avatar"><span>U</span></div>
            </div>
        </header>

        <main class="main-content">
            <div class="page-container">
                <nav class="breadcrumb">
                    <a href="index.html"><i data-lucide="home"></i> 首页</a>
                    <i data-lucide="chevron-right"></i>
                    <a href="kanban.html">看板视图</a>
                    <i data-lucide="chevron-right"></i>
                    <span id="breadcrumbTaskTitle">任务详情</span>
                </nav>

                <div class="task-detail-header">
                    <div class="task-detail-title">
                        <h1><span id="taskNumber">#</span> <span id="taskTitle">加载中...</span></h1>
                        <div class="task-detail-meta">
                            <span class="meta-item" id="taskStatusMeta"><i data-lucide="circle"></i> <span>--</span></span>
                            <span class="meta-item" id="taskPriorityMeta"><i data-lucide="flag"></i> <span>--</span></span>
                            <span class="meta-item" id="taskAgentMeta"><i data-lucide="user"></i> <a href="#" id="agentLink">--</a></span>
                            <span class="meta-item"><i data-lucide="clock"></i> <span id="taskHours">--</span></span>
                        </div>
                    </div>
                    <div class="task-detail-actions">
                        <div class="task-nav-arrows" id="taskNavArrows" style="display:flex;gap:8px;margin-right:8px;">
                            <a href="#" class="btn btn-secondary btn-sm" id="prevTaskBtn" title="上一个任务"><i data-lucide="chevron-left"></i></a>
                            <a href="#" class="btn btn-secondary btn-sm" id="nextTaskBtn" title="下一个任务"><i data-lucide="chevron-right"></i></a>
                        </div>
                        <button class="btn btn-secondary" id="editTaskBtn"><i data-lucide="edit-2"></i> 编辑</button>
                        <button class="btn btn-primary" id="executeTaskBtn"><i data-lucide="play"></i> 执行</button>
                        <button class="btn btn-secondary" id="viewPreviewBtn"><i data-lucide="file-text"></i> 预览</button>
                    </div>
                </div>

                <div class="detail-grid">
                    <aside class="detail-sidebar">
                        <div class="sidebar-section">
                            <h3>负责 Agent</h3>
                            <a href="#" class="sidebar-agent" id="sidebarAgentLink">
                                <div class="agent-avatar-sm" style="background:#555577" id="sidebarAgentAvatar">?</div>
                                <div class="sidebar-agent-info">
                                    <div class="name" id="sidebarAgentName">未分配</div>
                                    <div class="type" id="sidebarAgentType">--</div>
                                </div>
                            </a>
                        </div>

                        <div class="sidebar-section">
                            <h3>状态流转</h3>
                            <div class="status-timeline">
                                <div class="timeline-item"><div class="timeline-dot active" id="dotBacklog"><i data-lucide="check"></i></div><span class="timeline-label active">待认领</span></div>
                                <div class="timeline-item"><div class="timeline-dot" id="dotProgress"><i data-lucide="check"></i></div><span class="timeline-label">进行中</span></div>
                                <div class="timeline-item"><div class="timeline-dot" id="dotReview"><i data-lucide="check"></i></div><span class="timeline-label">待审视</span></div>
                                <div class="timeline-item"><div class="timeline-dot" id="dotDone"><i data-lucide="check"></i></div><span class="timeline-label">已完成</span></div>
                                <div class="timeline-item"><div class="timeline-dot" id="dotPublished"><i data-lucide="check"></i></div><span class="timeline-label">已发布</span></div>
                            </div>
                        </div>

                        <div class="sidebar-section">
                            <h3>相关任务</h3>
                            <div class="related-tasks" id="relatedTasks">
                                <!-- dynamically filled -->
                            </div>
                        </div>
                    </aside>

                    <div class="detail-main">
                        <div class="detail-tabs">
                            <button class="detail-tab active" data-panel="contentPanel">文档内容</button>
                            <button class="detail-tab" data-panel="logsPanel">执行日志</button>
                            <button class="detail-tab" data-panel="infoPanel">任务信息</button>
                        </div>

                        <div class="detail-panel active" id="contentPanel">
                            <div class="form-group">
                                <label class="form-label">Markdown 内容</label>
                                <textarea class="content-editor" id="taskContentEditor" placeholder="任务执行后将自动生成内容...">加载中...</textarea>
                            </div>
                            <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:16px;">
                                <button class="btn btn-secondary" id="renderPreviewBtn"><i data-lucide="eye"></i> 渲染预览</button>
                                <button class="btn btn-primary" id="saveContentBtn"><i data-lucide="save"></i> 保存内容</button>
                            </div>
                            <div id="previewRenderArea" style="margin-top:24px;display:none;">
                                <label class="form-label">实时预览</label>
                                <div class="markdown-body" id="livePreview" style="background:var(--bg-secondary);padding:24px;border-radius:var(--radius-md);border:1px solid var(--border-default);"></div>
                            </div>
                        </div>

                        <div class="detail-panel" id="logsPanel">
                            <div class="logs-list" id="logsList">
                                <div class="empty-detail"><i data-lucide="terminal"></i><p>暂无执行日志</p></div>
                            </div>
                        </div>

                        <div class="detail-panel" id="infoPanel">
                            <form id="taskInfoForm" class="form-group">
                                <div class="form-group">
                                    <label class="form-label">章节编号</label>
                                    <input type="number" class="form-input" name="chapterNumber" id="infoChapterNumber" min="1">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">章节标题</label>
                                    <input type="text" class="form-input" name="title" id="infoTitle">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">描述</label>
                                    <textarea class="form-textarea" name="description" id="infoDescription" rows="3"></textarea>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">优先级</label>
                                    <select class="form-select" name="priority" id="infoPriority">
                                        <option value="P0">P0 - 紧急重要</option>
                                        <option value="P1">P1 - 重要</option>
                                        <option value="P2">P2 - 一般</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">预估工时</label>
                                    <input type="number" class="form-input" name="estimatedHours" id="infoEstimatedHours" min="0.5" step="0.5">
                                </div>
                                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px;">
                                    <button type="button" class="btn btn-secondary" id="cancelInfoBtn">重置</button>
                                    <button type="button" class="btn btn-primary" id="saveInfoBtn">保存信息</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="footer-left"><span class="status-indicator online"></span><span>系统就绪</span></div>
            <div class="footer-center"><span>任务详情页</span></div>
            <div class="footer-right">
                <a href="index.html" class="footer-btn" title="返回首页"><i data-lucide="home"></i></a>
                <a href="settings.html" class="footer-btn" title="设置"><i data-lucide="settings"></i></a>
            </div>
        </footer>
    </div>

    <script>
    (function() {
        const STORAGE_KEY = 'agent_board_state';
        function loadState() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { return {}; }
        }
        const state = loadState();
        const tasks = state.tasks || [];
        const agents = state.agents || [];

        const params = new URLSearchParams(location.search);
        const taskId = params.get('id');
        const task = tasks.find(t => t.id === taskId);

        if (!task) {
            // No ID provided or task not found - show task list
            const taskList = tasks.sort((a,b) => a.chapterNumber - b.chapterNumber);
            const statusMap = { backlog:'待认领', in_progress:'进行中', review:'待审视', done:'已完成', published:'已发布' };
            document.querySelector('.page-container').innerHTML = `
                <nav class="breadcrumb">
                    <a href="index.html"><i data-lucide="home"></i> 首页</a>
                    <i data-lucide="chevron-right"></i>
                    <span id="breadcrumbProject">项目名</span>
                    <i data-lucide="chevron-right"></i>
                    <span>全部任务</span>
                </nav>
                <div class="task-detail-header">
                    <div class="task-detail-title">
                        <h1><i data-lucide="layout-grid"></i> 全部任务</h1>
                        <p style="color:var(--text-secondary);margin-top:4px;">共 ${taskList.length} 个任务</p>
                    </div>
                    <a href="kanban.html" class="btn btn-secondary"><i data-lucide="arrow-left"></i> 返回看板</a>
                </div>
                <div style="background:var(--bg-card);border:1px solid var(--border-default);border-radius:var(--radius-lg);overflow:hidden;">
                    <table style="width:100%;border-collapse:collapse;">
                        <thead>
                            <tr style="background:var(--bg-secondary);">
                                <th style="padding:12px 16px;text-align:left;font-size:12px;color:var(--text-muted);font-weight:500;">编号</th>
                                <th style="padding:12px 16px;text-align:left;font-size:12px;color:var(--text-muted);font-weight:500;">标题</th>
                                <th style="padding:12px 16px;text-align:left;font-size:12px;color:var(--text-muted);font-weight:500;">Agent</th>
                                <th style="padding:12px 16px;text-align:left;font-size:12px;color:var(--text-muted);font-weight:500;">状态</th>
                                <th style="padding:12px 16px;text-align:left;font-size:12px;color:var(--text-muted);font-weight:500;">优先级</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${taskList.length ? taskList.map(t => {
                                const a = agents.find(x => x.id === t.assignedAgentId);
                                return `<tr style="border-bottom:1px solid var(--border-default);transition:background 150ms;">
                                    <td style="padding:12px 16px;"><a href="task-detail.html?id=${t.id}" style="color:var(--accent-blue);text-decoration:none;font-weight:500;">${t.chapterNumber}</a></td>
                                    <td style="padding:12px 16px;"><a href="task-detail.html?id=${t.id}" style="color:var(--text-primary);text-decoration:none;">${t.title}</a></td>
                                    <td style="padding:12px 16px;">${a ? `<a href="agent-detail.html?id=${a.id}" style="color:var(--text-secondary);text-decoration:none;">${a.name}</a>` : '<span style="color:var(--text-muted);">未分配</span>'}</td>
                                    <td style="padding:12px 16px;"><span style="font-size:12px;padding:3px 10px;border-radius:10px;background:var(--bg-secondary);">${statusMap[t.status]}</span></td>
                                    <td style="padding:12px 16px;"><span class="priority ${t.priority.toLowerCase()}" style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;">${t.priority}</span></td>
                                </tr>`;
                            }).join('') : '<tr><td colspan="5" style="padding:40px;text-align:center;color:var(--text-muted);">暂无任务</td></tr>'}
                        </tbody>
                    </table>
                </div>
            `;
            lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
            return;
        }

        const agent = agents.find(a => a.id === task.assignedAgentId);

        // Fill header
        document.getElementById('breadcrumbTaskTitle').textContent = task.title;
        document.getElementById('taskNumber').textContent = '#' + task.chapterNumber;
        document.getElementById('taskTitle').textContent = task.title;

        const statusMap = { backlog:'待认领', in_progress:'进行中', review:'待审视', done:'已完成', published:'已发布' };
        const statusEl = document.getElementById('taskStatusMeta');
        statusEl.querySelector('span').textContent = statusMap[task.status] || task.status;
        document.getElementById('taskPriorityMeta').querySelector('span').textContent = task.priority;
        document.getElementById('taskHours').textContent = (task.estimatedHours || 0) + 'h';

        const agentLink = document.getElementById('agentLink');
        if (agent) {
            agentLink.textContent = agent.name;
            agentLink.href = 'agent-detail.html?id=' + agent.id;
        } else {
            agentLink.textContent = '未分配';
            agentLink.href = '#';
            agentLink.style.pointerEvents = 'none';
        }

        // Sidebar agent
        const sidebarAgentLink = document.getElementById('sidebarAgentLink');
        if (agent) {
            sidebarAgentLink.href = 'agent-detail.html?id=' + agent.id;
            document.getElementById('sidebarAgentAvatar').style.background = agent.avatarColor;
            document.getElementById('sidebarAgentAvatar').textContent = agent.name.charAt(0);
            document.getElementById('sidebarAgentName').textContent = agent.name;
            const typeNames = { architect:'架构师', pm:'产品经理', designer:'设计师', developer:'开发者', writer:'技术写作', reviewer:'评审' };
            document.getElementById('sidebarAgentType').textContent = typeNames[agent.type] || agent.type;
        } else {
            sidebarAgentLink.style.pointerEvents = 'none';
        }

        // Timeline
        const statusOrder = ['backlog','in_progress','review','done','published'];
        const currentIdx = statusOrder.indexOf(task.status);
        statusOrder.forEach((s, i) => {
            const dot = document.getElementById('dot' + s.replace(/_([a-z])/g, (_,c)=>c.toUpperCase()).replace(/^\w/, c=>c.toUpperCase()));
            if (!dot) return;
            if (i <= currentIdx) {
                dot.classList.add('active');
                dot.nextElementSibling.classList.add('active');
            }
        });

        // Related tasks (same agent or adjacent chapter)
        const relatedContainer = document.getElementById('relatedTasks');
        const related = tasks.filter(t => t.id !== task.id && (t.assignedAgentId === task.assignedAgentId || Math.abs(t.chapterNumber - task.chapterNumber) === 1)).slice(0, 5);
        if (related.length) {
            relatedContainer.innerHTML = related.map(t => {
                const a = agents.find(x => x.id === t.assignedAgentId);
                return `<a href="task-detail.html?id=${t.id}" class="related-task-item">
                    <div class="chapter-num" style="background:${a?.avatarColor||'var(--text-muted)'}">${t.chapterNumber}</div>
                    <div class="task-title">${t.title}</div>
                    <div class="task-status">${statusMap[t.status]}</div>
                </a>`;
            }).join('');
        } else {
            relatedContainer.innerHTML = '<p style="font-size:13px;color:var(--text-muted);">暂无相关任务</p>';
        }

        // Content editor
        document.getElementById('taskContentEditor').value = task.content || '';
        document.getElementById('saveContentBtn').addEventListener('click', () => {
            task.content = document.getElementById('taskContentEditor').value;
            task.updatedAt = Date.now();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            showToast('内容已保存', 'success');
        });
        document.getElementById('renderPreviewBtn').addEventListener('click', () => {
            const md = document.getElementById('taskContentEditor').value;
            document.getElementById('previewRenderArea').style.display = 'block';
            document.getElementById('livePreview').innerHTML = typeof marked !== 'undefined' ? marked.parse(md) : '<p>Marked.js 未加载</p>';
        });

        // Info form
        document.getElementById('infoChapterNumber').value = task.chapterNumber;
        document.getElementById('infoTitle').value = task.title;
        document.getElementById('infoDescription').value = task.description || '';
        document.getElementById('infoPriority').value = task.priority;
        document.getElementById('infoEstimatedHours').value = task.estimatedHours || 2;
        document.getElementById('saveInfoBtn').addEventListener('click', () => {
            task.chapterNumber = parseInt(document.getElementById('infoChapterNumber').value);
            task.title = document.getElementById('infoTitle').value;
            task.description = document.getElementById('infoDescription').value;
            task.priority = document.getElementById('infoPriority').value;
            task.estimatedHours = parseFloat(document.getElementById('infoEstimatedHours').value);
            task.updatedAt = Date.now();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            showToast('任务信息已更新', 'success');
            setTimeout(() => location.reload(), 600);
        });
        document.getElementById('cancelInfoBtn').addEventListener('click', () => {
            document.getElementById('infoChapterNumber').value = task.chapterNumber;
            document.getElementById('infoTitle').value = task.title;
            document.getElementById('infoDescription').value = task.description || '';
            document.getElementById('infoPriority').value = task.priority;
            document.getElementById('infoEstimatedHours').value = task.estimatedHours || 2;
        });

        // Logs
        const logs = (state.logs || []).filter(l => l.taskId === taskId).slice(-20);
        const logsList = document.getElementById('logsList');
        if (logs.length) {
            logsList.innerHTML = logs.map(l => {
                const a = agents.find(x => x.id === l.agentId);
                const actionLabels = { thinking:'思考中', generating:'生成中', reviewing:'审视中', complete:'完成', error:'错误' };
                return `<div class="log-card">
                    <div class="log-card-header">
                        <div class="log-card-agent">
                            <div class="agent-avatar-sm" style="background:${a?.avatarColor||'#555577'};width:24px;height:24px;font-size:10px;">${a?.name?.charAt(0)||'?'}</div>
                            ${a?.name || '系统'}
                        </div>
                        <span class="log-card-time">${new Date(l.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="log-card-body"><span class="log-action ${l.action}">${actionLabels[l.action] || l.action}</span> — ${l.message}</div>
                </div>`;
            }).join('');
        }

        // Tabs
        document.querySelectorAll('.detail-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.panel).classList.add('active');
            });
        });

        // Prev/Next task navigation
        const sortedTasks = tasks.sort((a,b) => a.chapterNumber - b.chapterNumber);
        const currentIndex = sortedTasks.findIndex(t => t.id === taskId);
        const prevTask = sortedTasks[currentIndex - 1];
        const nextTask = sortedTasks[currentIndex + 1];
        const prevBtn = document.getElementById('prevTaskBtn');
        const nextBtn = document.getElementById('nextTaskBtn');
        if (prevTask) { prevBtn.href = 'task-detail.html?id=' + prevTask.id; }
        else { prevBtn.style.opacity = '0.4'; prevBtn.style.pointerEvents = 'none'; }
        if (nextTask) { nextBtn.href = 'task-detail.html?id=' + nextTask.id; }
        else { nextBtn.style.opacity = '0.4'; nextBtn.style.pointerEvents = 'none'; }

        // Header buttons
        document.getElementById('viewPreviewBtn').addEventListener('click', () => {
            window.open('preview.html', '_self');
        });
        document.getElementById('editTaskBtn').addEventListener('click', () => {
            document.querySelector('.detail-tab[data-panel="infoPanel"]').click();
        });
        document.getElementById('executeTaskBtn').addEventListener('click', () => {
            showToast('请返回看板页面执行任务', 'info');
            setTimeout(() => { window.location.href = 'kanban.html'; }, 800);
        });

        // Toast helper
        function showToast(msg, type='info') {
            const container = document.createElement('div');
            container.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:2000;';
            const toast = document.createElement('div');
            toast.className = 'toast ' + type;
            const iconMap = { success:'check-circle', error:'x-circle', warning:'alert-triangle', info:'info' };
            toast.innerHTML = `<div class="toast-icon"><i data-lucide="${iconMap[type]||'info'}"></i></div><div class="toast-message">${msg}</div>`;
            container.appendChild(toast); document.body.appendChild(container);
            lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
            setTimeout(() => { toast.classList.add('hiding'); setTimeout(() => container.remove(), 250); }, 3000);
        }

        lucide.createIcons({ icons: lucide.icons, nameAttr: 'data-lucide' });
    })();
    </script>
    <script src="utils.js"></script>
    <script src="store.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            function syncProject() {
                const project = Store.getCurrentProject();
                if (project) {
                    const nameEl = document.getElementById('currentProjectName');
                    if (nameEl) nameEl.textContent = project.name;
                    const bcEl = document.getElementById('breadcrumbProject');
                    if (bcEl) bcEl.textContent = project.name;
                }
            }
            syncProject();
            Store.subscribe('currentProjectId', () => {
                syncProject();
            });
        });
    </script>

</body>
</html>
